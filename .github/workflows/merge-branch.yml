name: Sync multiple branches

on:
  workflow_run:
    workflows: [ "Publish to npm" ]
    types:
      - completed

permissions:
  contents: write

jobs:
  merge-main-to-develop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Merge main to develop
        run: |
          git checkout develop
          git merge origin/main --no-edit || {
            echo "⚠️ Merge conflict detected, resolving..."
          
            # Check if package-lock.json has conflicts
            if git diff --name-only --diff-filter=U | grep -q "package-lock.json"; then
              echo "📦 Resolving package-lock.json conflicts with npm..."
              npm install --package-lock-only
              git add package-lock.json
            fi
          
            # Commit the resolution
            git commit --no-edit
          }

      - name: Auto-version beta after merge
        id: auto_version
        run: |
          # Get merged version from main
          MERGED_VERSION=$(git show origin/main:package.json | grep '"version"' | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "Merged version from main: $MERGED_VERSION"
          
          # Get current develop version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current develop version: $CURRENT_VERSION"
          
          # Check if main version is newer (stable release)
          if [[ "$MERGED_VERSION" != "$CURRENT_VERSION" && ! "$MERGED_VERSION" == *"-beta"* ]]; then
            echo "📦 New stable version detected, creating beta..."
          
            # Reset to merged version and create new beta
            npm version $MERGED_VERSION --no-git-tag-version
            npm version prerelease --preid=beta --no-git-tag-version
          
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "✅ Created new beta version: $NEW_VERSION"
          
            git add package.json package-lock.json
            git commit -m "chore: auto-version to $NEW_VERSION after merge"
            git tag $NEW_VERSION
          else
            echo "No version bump needed"
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        run: git push origin develop --tags
