name: Beta Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Beta version bump type'
        required: false
        type: choice
        default: 'prerelease'
        options:
          - prerelease
          - minor
          - major

jobs:
  beta-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump beta version
        id: version
        run: |
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          # Check if this is already a beta version
          if [[ "$CURRENT_VERSION" == *"-beta."* ]]; then
            # Increment beta number
            npm version prerelease --preid=beta --no-git-tag-version
          else
            # Create first beta from current version
            npm version prerelease --preid=beta --no-git-tag-version
          fi
          
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.new_version }}
          git push origin develop --tags

      - name: Build
        run: npm run build

      - name: Publish to npm (beta tag)
        run: npm publish --tag beta --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          prerelease: true
          body: |
            ## Beta Release
            
            This is a beta release for testing purposes.
            
            **Install**: `npm install opencode-skills-collection@beta`
