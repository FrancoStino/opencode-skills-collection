name: Create Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - current
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Install dependencies
        run: npm ci
      - name: Bump version
        id: bump
        run: |
          if [ "${{ github.event.inputs.version }}" = "current" ]; then
            NEW_VERSION="v$(node -p "require('./package.json').version")"
          else
            NEW_VERSION=$(npm version ${{ github.event.inputs.version }} --no-git-tag-version)
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
      - name: Commit and push
        run: |
          if [ "${{ github.event.inputs.version }}" != "current" ]; then
            git add package.json package-lock.json
            git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          fi
          git tag ${{ steps.bump.outputs.new_version }}
          git push origin main --tags
      - name: Generate changelog
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ steps.bump.outputs.new_version }}
      - name: Commit CHANGELOG.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: 'docs: update CHANGELOG.md for ${{ steps.bump.outputs.new_version }} [skip ci]'
          file_pattern: CHANGELOG.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_version }}
          name: ${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changes }}
          make_latest: true
      - name: Remove -beta suffix
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          CLEAN=$(echo "$CURRENT" | sed 's/-beta.*//')

          if [ "$CURRENT" = "$CLEAN" ]; then
            echo "No -beta suffix found, nothing to do."
            exit 0
          fi

          npm version "$CLEAN" --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: remove -beta suffix, version is now $CLEAN [skip ci]"

          MAX_RETRIES=5
          RETRY=0
          until git push origin main; do
            RETRY=$((RETRY + 1))
            if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
              echo "❌ Push failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "⚠️ Push rejected, rebasing ($RETRY/$MAX_RETRIES)..."
            git pull origin main --rebase
          done
